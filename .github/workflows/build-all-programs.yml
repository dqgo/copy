name: Build And Release All Programs

on:
  push:
    tags-ignore:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_node_packages:
    name: Build Node Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/sync-simulator/package-lock.json

      - name: Install Toolchain Dependencies
        run: npm run bootstrap

      - name: Build TypeScript Packages
        run: npm run build

      - name: Package Node Outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          tar -czf artifacts/node-packages-dist.tar.gz \
            packages/protocol-spec/dist \
            packages/crypto-spec/dist \
            packages/sync-simulator/dist \
            packages/app-core/dist \
            packages/custom-sync-server/dist

      - name: Upload Node Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-packages-dist
          path: artifacts/node-packages-dist.tar.gz
          if-no-files-found: error

  build_windows_dotnet:
    name: Build Windows .NET Projects
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: winforms
            project: apps/windows/ClipboardSync.Windows.csproj
            publish: true
            output: artifacts/windows-winforms
          - name: winui3
            project: apps/windows-winui/ClipboardSync.Windows.WinUI.csproj
            publish: true
            output: artifacts/windows-winui3
          - name: validation-runner
            project: scripts/validation/windows-scenario-runner/windows-scenario-runner.csproj
            publish: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        shell: pwsh
        run: dotnet restore ${{ matrix.project }}

      - name: Build
        if: ${{ !matrix.publish }}
        shell: pwsh
        run: dotnet build ${{ matrix.project }} -c Release --no-restore

      - name: Publish
        if: ${{ matrix.publish }}
        shell: pwsh
        run: dotnet publish ${{ matrix.project }} -c Release --no-restore -o ${{ matrix.output }}

      - name: Archive Windows Output
        if: ${{ matrix.publish }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path "${{ matrix.output }}\*" -DestinationPath "artifacts\${{ matrix.name }}.zip" -Force

      - name: Upload Windows Artifact
        if: ${{ matrix.publish }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.name }}
          path: artifacts/${{ matrix.name }}.zip
          if-no-files-found: error

  build_android:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build Android Release
        working-directory: apps/android
        run: gradle assembleRelease

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/android/app/build/outputs/apk/release/**/*.apk
          if-no-files-found: error

  build_apple_sources:
    name: Build Apple Swift Sources
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Typecheck iOS Swift Sources
        shell: bash
        run: |
          set -euo pipefail
          if [ -d apps/ios/Sources ]; then
            ios_sources=$(find apps/ios/Sources -name "*.swift" -print)
            if [ -n "$ios_sources" ]; then
              xcrun --sdk iphonesimulator swiftc -typecheck $ios_sources
            else
              echo "No iOS Swift sources found."
            fi
          else
            echo "iOS source directory not found."
          fi

      - name: Typecheck macOS Swift Sources
        shell: bash
        run: |
          set -euo pipefail
          if [ -d apps/macos/Sources ]; then
            mac_sources=$(find apps/macos/Sources -name "*.swift" -print)
            if [ -n "$mac_sources" ]; then
              xcrun --sdk macosx swiftc -typecheck $mac_sources
            else
              echo "No macOS Swift sources found."
            fi
          else
            echo "macOS source directory not found."
          fi

      - name: Package Apple Typecheck Report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            echo "Apple source typecheck passed"
            echo "commit: ${GITHUB_SHA}"
            echo "run: ${GITHUB_RUN_NUMBER}"
          } > artifacts/apple-typecheck.txt

      - name: Upload Apple Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apple-typecheck-report
          path: artifacts/apple-typecheck.txt
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    if: ${{ github.event_name == 'push' }}
    needs:
      - build_node_packages
      - build_windows_dotnet
      - build_android
      - build_apple_sources
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Compose Release Metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          echo "tag=build-${GITHUB_RUN_NUMBER}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "name=Build ${GITHUB_RUN_NUMBER} (${short_sha})" >> "$GITHUB_OUTPUT"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: true
          generate_release_notes: true
          files: |
            release-assets/**/*
