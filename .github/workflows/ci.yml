name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "packages/sync-simulator/package-lock.json"

      - name: Validate
        shell: pwsh
        run: |
          npm run ci:validate
